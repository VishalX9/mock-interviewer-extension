<!DOCTYPE html>
<html>
<head>
  <title>Mock Interviewer Options</title>
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 400px; }
    input { width: 100%; padding: 8px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 8px 16px; background: #2563eb; color: white; border: none; border-radius: 4px; cursor: pointer; }
    #status { margin-top: 10px; color: #10b981; font-weight: bold; }
  </style>
</head>
<body>
  <h3>Extension Settings</h3>
  <label for="apiKey">Gemini API Key:</label>
  <input type="password" id="apiKey" placeholder="Enter your API key..." />
  <button id="saveBtn">Save Key</button>
  <div id="status"></div>
  <script src="options.js"></script>
</body>
</html>
